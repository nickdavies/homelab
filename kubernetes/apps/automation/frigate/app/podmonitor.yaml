---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/monitoring.coreos.com/podmonitor_v1.json
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: frigate
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: frigate
  podMetricsEndpoints:
    - port: http
      path: /api/metrics
      interval: 60s
