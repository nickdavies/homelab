---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app k8s-gateway
spec:
  interval: 30m
  chart:
    spec:
      chart: k8s-gateway
      version: 2.4.0
      sourceRef:
        kind: HelmRepository
        name: k8s-gateway
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      strategy: rollback
  uninstall:
    keepHistory: false
  values:
    fullnameOverride: *app
    # Authoritative zone served locally from cluster state (no internet dependency).
    domain: "internal.${SECRET_DOMAIN}"
    ttl: 60
    replicaCount: 2
    # Resolve Gateway API routes (-> parent Gateway LB IP) and annotated
    # LoadBalancer Services (-> their own LB IP, e.g. mqtt/smtp/influx-direct/minecraft).
    watchedResources:
      - HTTPRoute
      - TLSRoute
      - Service
    service:
      type: LoadBalancer
      loadBalancerIP: 192.168.254.200
