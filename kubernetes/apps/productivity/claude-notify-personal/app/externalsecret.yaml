---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: claude-notify-personal
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: claude-notify-personal-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        CLAUDE_NOTIFY_TOKENS: "{{ .CLAUDE_NOTIFY_TOKENS }}"
        PUSHOVER_TOKEN: "{{ .PUSHOVER_TOKEN }}"
        PUSHOVER_USER: "{{ .PUSHOVER_USER }}"
        OAUTH_ALLOWED_EMAILS: "{{ .OAUTH_ALLOWED_EMAILS }}"
        OIDC_CLIENT_SECRET: "{{ .CLAUDE_NOTIFY_PERSONAL_OAUTH_CLIENT_SECRET }}"
  dataFrom:
    - extract:
        key: claude-notify-personal
    - extract:
        key: authelia
