apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: paperless-internal
  labels:
    auth: "authelia" # TODO make this opt-out
spec:
  hostnames:
    - "paperless.internal.${SECRET_DOMAIN}"
  parentRefs:
    - name: internal
      namespace: network
  rules:
    - backendRefs:
        - kind: Service
          name: peperless-ngx
          port: 80
