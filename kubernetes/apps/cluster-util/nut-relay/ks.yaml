---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app nut-relay
  namespace: flux-system
spec:
  targetNamespace: cluster-util
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  dependsOn:
    - name: external-secrets-stores
  interval: 30m
  path: ./kubernetes/apps/cluster-util/nut-relay/app
  prune: true
  retryInterval: 2m
  sourceRef:
    kind: GitRepository
    name: homelab
  timeout: 5m
  wait: false
