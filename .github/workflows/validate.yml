name: Validate

on:
  pull_request:
    paths:
      - "kubernetes/**"
      - "scripts/**"
      - "Makefile"
      - ".github/workflows/validate.yml"
  push:
    branches:
      - main
    paths:
      - "kubernetes/**"
      - "scripts/**"

# Cancel in-progress runs for the same PR/branch when a new commit is pushed.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1: Python-based checks (fast, no extra tooling)
  #   - YAML syntax
  #   - Kustomization resource references
  #   - Flux cross-references (HelmRelease sources, dependsOn, spec.path, secrets)
  # ─────────────────────────────────────────────────────────────────────────────
  validate-python:
    name: Flux cross-reference checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.14"

      - name: Install PyYAML
        run: pip install pyyaml

      - name: YAML syntax
        run: make validate-yaml

      - name: Kustomization resource references
        run: make validate-kustomize

      - name: Flux cross-references
        run: make validate-refs

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2: kustomize build + kubeconform schema validation
  #   - Every kustomization.yaml is built and its output schema-validated
  #   - Catches wrong field names/types in both standard K8s and Flux CRDs
  # ─────────────────────────────────────────────────────────────────────────────
  validate-kubeconform:
    name: Schema validation (kubeconform)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.14"

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Install kustomize
        uses: imranismail/setup-kustomize@2ba527d4d055ab63514ba50a99456fc35684947f # v2

      - name: Install kubeconform
        run: |
          curl -sL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz \
            | tar xz
          sudo mv kubeconform /usr/local/bin/
          kubeconform -v

      - name: Schema validation
        run: make validate-kubeconform

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 3: flux-local — Flux reconciliation graph structure validation
  #   - Walks the repo as kustomize-controller would
  #   - Verifies Kustomization paths, sourceRefs, and dependsOn consistency
  #   - Helm rendering is skipped (requires runtime secrets not in the repo)
  # ─────────────────────────────────────────────────────────────────────────────
  validate-flux-local:
    name: Flux graph validation (flux-local)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.14"

      - name: Install flux-local
        run: pip install flux-local

      - name: Install helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5

      - name: Install kustomize
        uses: imranismail/setup-kustomize@2ba527d4d055ab63514ba50a99456fc35684947f # v2

      - name: Install flux CLI
        run: |
          curl -s https://fluxcd.io/install.sh | bash
          flux version --client

      - name: Flux reconciliation simulation
        run: make validate-flux-local

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 4: Manifest diff — rendered manifest comparison against base branch
  #   - Runs flux-local diff to compare the PR's rendered output against base
  #   - Posts the diff (or "no changes") as a PR comment for easy review
  #   - Informational only (does not block merge)
  # ─────────────────────────────────────────────────────────────────────────────
  manifest-diff:
    name: Manifest diff
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.14"

      - name: Install flux-local
        run: pip install flux-local

      - name: Install helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5

      - name: Install kustomize
        uses: imranismail/setup-kustomize@2ba527d4d055ab63514ba50a99456fc35684947f # v2

      - name: Install flux CLI
        run: |
          curl -s https://fluxcd.io/install.sh | bash
          flux version --client

      - name: Fetch base branch
        run: git fetch origin ${{ github.event.pull_request.base.ref }} --depth=1

      - name: Generate manifest diff
        id: diff
        run: |
          # flux-local diff sends the actual diff to stdout and warnings to
          # stderr.  Capture both separately so we can report accurately.
          exit_code=0
          make manifest-diff DIFF_BRANCH=origin/${{ github.event.pull_request.base.ref }} \
            FLUX_LOCAL_EXTRA_ARGS="--skip-invalid-kustomization-paths" \
            > /tmp/manifest-diff.txt 2>/tmp/manifest-diff-stderr.txt || exit_code=$?
          if [ -s /tmp/manifest-diff-stderr.txt ]; then
            echo "::group::flux-local stderr"
            cat /tmp/manifest-diff-stderr.txt
            echo "::endgroup::"
          fi
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"

      - name: Post PR comment
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          diff_output=$(cat /tmp/manifest-diff.txt)
          stderr_output=$(cat /tmp/manifest-diff-stderr.txt)
          exit_code=${{ steps.diff.outputs.exit_code }}

          has_diff=false
          if [ -n "$(echo "$diff_output" | tr -d '[:space:]')" ]; then
            has_diff=true
          fi

          # Filter stderr to only lines that look like actual diff content
          # (flux-local may output diff to stderr instead of stdout)
          diff_from_stderr=""
          if [ "$has_diff" = "false" ] && [ -n "$stderr_output" ]; then
            # Extract lines that look like diff output (---, +++, @@, +/- lines)
            # or are part of the diff context
            diff_from_stderr=$(echo "$stderr_output" | grep -v "^Kustomization " | grep -v "^Unable to find " | grep -v "^flux-local error:" | grep -v "^make:" | grep -v "^make\[" | sed '/^$/d' || true)
            if [ -n "$(echo "$diff_from_stderr" | tr -d '[:space:]')" ]; then
              diff_output="$diff_from_stderr"
              has_diff=true
            fi
          fi

          if [ "$has_diff" = "true" ]; then
            # Truncate if too long for a GH comment (max ~65536 chars)
            if [ ${#diff_output} -gt 60000 ]; then
              diff_output="${diff_output:0:60000}"$'\n\n'"... (truncated)"
            fi
            body="### Manifest Diff"$'\n\n'"<details>"$'\n'"<summary>Click to expand diff</summary>"$'\n\n'"\`\`\`diff"$'\n'"${diff_output}"$'\n'"\`\`\`"$'\n\n'"</details>"
          elif [ "$exit_code" != "0" ]; then
            body="### Manifest Diff"$'\n\n'":warning: Diff generation encountered errors. Check the [CI logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details."
          else
            body="### Manifest Diff"$'\n\n'"No manifest changes detected. :white_check_mark:"
          fi
          # Update existing comment or create new one
          gh pr comment "$PR_NUMBER" --body "$body" --edit-last 2>/dev/null \
            || gh pr comment "$PR_NUMBER" --body "$body"
